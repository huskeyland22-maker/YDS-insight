# 정적 사이트(GitHub Pages 등)에서 티커·해외가 “하루 종일 그대로”인 근본 원인은
# 배포된 JSON/JS가 갱신되지 않기 때문입니다. Python 없이 Node만으로
# Yahoo 기반 티커·해외·파생 data/* 를 주기적으로 받아 커밋·푸시합니다.
# (패닉 표의 VIX 등 일부 지표는 auto-update-panic.yml 의 Python 배치가 갱신합니다.)

name: Refresh ticker and overseas (Node)

on:
  schedule:
    # UTC 매 4시간 (하루 6회). API 부담을 줄이려면 */6 으로 변경 가능.
    - cron: "0 */4 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: yds-data-${{ github.ref }}
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Fetch ticker & overseas (panic rows unchanged)
        env:
          SKIP_PANIC: "1"
          SKIP_YOUTUBE: "1"
        run: node auto-update-panic-data.mjs

      - name: Regenerate data/panic.json, data/ticker.json, us-close snapshot
        env:
          FORCE_UPDATE: "true"
        run: node scripts/fetch.js

      - name: Commit and push if data changed
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add ticker-data.json ticker-data.js overseas-data.json overseas-data.js \
            data/panic.json data/ticker.json data/us-close-snapshot.json data/us-close-snapshot.js
          if git diff --staged --quiet; then
            echo "No file changes — nothing to commit."
            exit 0
          fi
          npm run version:site
          git add site-version.js
          git commit -m "chore: refresh ticker/overseas (scheduled Node) [skip ci]"
          git push origin "HEAD:${{ github.ref_name }}"
