name: Auto Update Panic Data

on:
  schedule:
    # 08:30 KST = 23:30 UTC (previous day)
    - cron: "30 23 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Update panic and ticker data
        run: node auto-update-panic-data.mjs

      - name: Bump site version for cache busting
        run: npm run version:site

      - name: Commit changes if needed
        run: |
          if git diff --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git add panic-data.json panic-data.js ticker-data.json ticker-data.js site-version.js
          git commit -m "chore: auto update panic and ticker data"

      - name: Push to main
        run: git push origin main
