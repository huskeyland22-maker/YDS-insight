name: Update panic signal JSON

on:
  schedule:
    # KST 08:30 (전일 23:30 UTC)
    - cron: "30 23 * * *"
    # KST 09:30 (당일 00:30 UTC)
    - cron: "30 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: yds-data-${{ github.ref }}
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run fetch script
        env:
          RUN_SLOT: ${{ github.event_name == 'workflow_dispatch' && '수동' || (github.event.schedule == '30 0 * * *' && '2차' || '1차') }}
          FORCE_UPDATE: ${{ github.event.schedule == '30 0 * * *' && 'true' || 'false' }}
        run: node scripts/fetch.js

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/panic.json data/market.json data/ticker.json
          if git diff --staged --quiet; then
            echo "No changes to data/panic.json, data/market.json, or data/ticker.json"
            exit 0
          fi
          git commit -m "chore: update data/panic.json and data/market.json [skip ci]" || echo "No commit (skipped)"
          git push origin main
