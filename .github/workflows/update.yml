name: Update panic signal JSON

on:
  schedule:
    - cron: "30 23 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run fetch script
        run: node scripts/fetch.js

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/panic.json data/market.json
          if git diff --staged --quiet; then
            echo "No changes to data/panic.json or data/market.json"
            exit 0
          fi
          git commit -m "chore: update data/panic.json and data/market.json [skip ci]"
          git push
