# GitHub은 기본 브랜치에 60일간 활동이 없으면 scheduled workflow 를 끕니다.
# 주 1회 가벼운 커밋으로 저장소 활동을 유지해 데이터 자동 갱신이 멈추지 않게 합니다.
# 불필요하면 이 파일을 삭제하거나 on.schedule 을 주석 처리하세요.

name: Repo activity keepalive

on:
  schedule:
    - cron: "15 2 * * 0"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: yds-keepalive
  cancel-in-progress: true

jobs:
  touch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Record timestamp
        run: date -u +"%Y-%m-%dT%H:%MZ" >> .github/keepalive-log.txt
      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/keepalive-log.txt
          if git diff --staged --quiet; then
            echo "Nothing to commit"
            exit 0
          fi
          git commit -m "chore: weekly keepalive for scheduled workflows [skip ci]"
          git push origin "HEAD:${{ github.ref_name }}"
