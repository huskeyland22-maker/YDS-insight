<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>밸류체인 맵 샘플 · Y'ds의 투자 인사이트</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="site-version.js"></script>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="bg-[#0c1222] text-slate-100">
    <div class="bg-layer" aria-hidden="true"></div>
    <div class="bg-glow bg-glow--gold" aria-hidden="true"></div>
    <div class="bg-glow bg-glow--blue" aria-hidden="true"></div>

    <header class="site-header">
      <div class="container header-inner">
        <a class="logo" href="index.html">Y'ds</a>
        <nav class="nav" aria-label="주요 메뉴">
          <a href="index.html">홈</a>
          <a href="value-chain-map-fixed.html">기본형</a>
          <a href="value-chain-map-sample.html">샘플형</a>
        </nav>
      </div>
    </header>

    <main class="container py-10 md:py-14">
      <section class="mb-8">
        <p class="text-xs md:text-sm tracking-[0.22em] uppercase text-blue-200/70">Alternative Layout Sample</p>
        <h1 class="mt-2 text-3xl md:text-4xl font-semibold">밸류체인 맵 샘플 (단계별 보기)</h1>
        <p class="mt-3 max-w-4xl text-sm md:text-base text-slate-300">
          섹터를 열면 종목이 `수요단 · 생산단 · 부품단` 3열로 자동 정렬됩니다. 기존 카드형과 다르게 각 섹터 내 구조를 단계 중심으로 읽기 쉽도록 구성한 샘플입니다.
        </p>
      </section>

      <section id="sample-grid" class="space-y-4"></section>
    </main>

    <script src="value-chain-data.js"></script>
    <script>
      (function () {
        var sectors = Array.isArray(window.VALUE_CHAIN_SECTORS) ? window.VALUE_CHAIN_SECTORS.slice() : [];
        var stageOrder = ["수요단", "생산단", "부품단"];
        var stageClass = {
          "수요단": "border-emerald-300/30 bg-emerald-500/10 text-emerald-100",
          "생산단": "border-amber-300/30 bg-amber-500/10 text-amber-100",
          "부품단": "border-indigo-300/30 bg-indigo-500/10 text-indigo-100"
        };

        function stockUrl(item) {
          if (item.code) return "https://finance.naver.com/item/main.naver?code=" + encodeURIComponent(item.code);
          return "https://finance.naver.com/search/search.naver?query=" + encodeURIComponent(item.name);
        }

        function inferStage(item) {
          var text = ((item && item.tip) || "") + " " + ((item && item.name) || "");
          var t = text.toLowerCase();
          var demand = ["플랫폼", "서비스", "유통", "완성", "브랜드", "생태계", "수요"];
          var parts = ["소재", "부품", "장비", "테스트", "기판", "센서", "밸브", "음극", "양극", "전해질"];
          var production = ["제조", "생산", "주기기", "시스템", "엔진", "패키징", "설계", "파운드리", "셀", "cdmo"];
          if (parts.some(function (k) { return t.indexOf(k) !== -1; })) return "부품단";
          if (production.some(function (k) { return t.indexOf(k) !== -1; })) return "생산단";
          if (demand.some(function (k) { return t.indexOf(k) !== -1; })) return "수요단";
          return "생산단";
        }

        function inferSubsector(item, sectorId, stage) {
          var text = (((item && item.tip) || "") + " " + ((item && item.name) || "")).toLowerCase();
          if (sectorId === "power-grid-hvdc") {
            if (text.indexOf("송전") !== -1 || text.indexOf("hvdc") !== -1) return "송전·HVDC";
            if (text.indexOf("케이블") !== -1 || text.indexOf("전선") !== -1) return "케이블·전력망";
            return "변압기·전력기기";
          }
          if (sectorId === "ai-datacenter-infra") {
            if (text.indexOf("서버") !== -1 || text.indexOf("hbm") !== -1) return "서버·수요";
            if (text.indexOf("냉각") !== -1 || text.indexOf("hvac") !== -1 || text.indexOf("전력") !== -1) return "전력·냉각";
            return "운영·부품";
          }
          if (sectorId === "hbm-ai-semiconductor") {
            if (text.indexOf("hbm") !== -1 || text.indexOf("메모리") !== -1) return "메모리/HBM";
            if (text.indexOf("테스트") !== -1 || text.indexOf("패키") !== -1) return "후공정·테스트";
            return "장비·소재";
          }
          return stage === "수요단" ? "서비스·수요" : stage === "부품단" ? "소재·부품" : "제조·통합";
        }

        function itemHtml(item, stage, subsector) {
          return (
            '<li class="mb-1.5"><a class="block rounded-md px-2 py-1.5 text-sm text-slate-200 hover:bg-blue-500/20 hover:text-white" href="' +
            stockUrl(item) +
            '" target="_blank" rel="noopener noreferrer"><span>' +
            item.name +
            '</span><span class="ml-2 text-[11px] text-slate-400">(' +
            subsector +
            ")</span></a></li>"
          );
        }

        function stageColumn(title, list) {
          return (
            '<section class="rounded-xl border ' +
            stageClass[title] +
            ' p-3"><h3 class="mb-2 text-sm font-semibold">' +
            title +
            '</h3><ul>' +
            list.join("") +
            "</ul></section>"
          );
        }

        function renderSectorCard(sector, idx) {
          var allItems = (sector.top || []).concat(sector.hidden || []);
          var grouped = { "수요단": [], "생산단": [], "부품단": [] };

          allItems.forEach(function (item) {
            var stage = inferStage(item);
            var subsector = inferSubsector(item, sector.id, stage);
            grouped[stage].push(itemHtml(item, stage, subsector));
          });

          return (
            '<details class="rounded-2xl border border-slate-500/25 bg-[#111a33]/85 p-4 open:shadow-[0_10px_30px_rgba(0,0,0,0.35)]">' +
            '<summary class="cursor-pointer list-none"><div class="flex items-center justify-between gap-2"><div><p class="text-xs tracking-wider text-blue-200/70">SECTOR ' +
            String(idx + 1).padStart(2, "0") +
            '</p><h2 class="text-lg font-semibold">' +
            sector.icon +
            " " +
            sector.name +
            '</h2></div><span class="rounded-full border px-2 py-0.5 text-xs">' +
            sector.heat +
            "</span></div></summary>" +
            '<div class="mt-4 grid grid-cols-1 gap-3 md:grid-cols-3">' +
            stageOrder.map(function (stage) { return stageColumn(stage, grouped[stage]); }).join("") +
            "</div></details>"
          );
        }

        var container = document.getElementById("sample-grid");
        if (!container) return;
        sectors.sort(function (a, b) { return a.order - b.order; });
        container.innerHTML = sectors.map(renderSectorCard).join("");
      })();
    </script>
  </body>
</html>
