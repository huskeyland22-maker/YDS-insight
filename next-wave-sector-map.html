<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>Next Wave Sector Map · Y'ds의 투자 인사이트</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,500;0,600;1,500&display=swap"
      rel="stylesheet"
    />
    <script src="site-version.js"></script>
    <link rel="stylesheet" href="styles.css" />
    <style>
      .nw-card {
        border: 1px solid rgba(146, 164, 201, 0.25);
        border-radius: 1rem;
        background: linear-gradient(180deg, rgba(18, 28, 52, 0.82), rgba(10, 16, 34, 0.92));
        padding: 1rem;
      }
      .map-scroll {
        display: flex;
        gap: 0.65rem;
        overflow-x: auto;
        padding-bottom: 0.25rem;
      }
      .map-node {
        flex: 0 0 auto;
        min-width: 8.5rem;
        border: 1px solid rgba(148, 163, 184, 0.35);
        border-radius: 0.85rem;
        padding: 0.55rem 0.65rem;
        font-size: 0.82rem;
        color: #e2e8f0;
        background: rgba(15, 23, 42, 0.75);
        text-decoration: none;
      }
      .map-node--active {
        border-color: rgba(96, 165, 250, 0.8);
        box-shadow: inset 0 0 0 1px rgba(96, 165, 250, 0.35), 0 0 20px rgba(59, 130, 246, 0.2);
      }
      .map-arrow {
        flex: 0 0 auto;
        align-self: center;
        color: #93c5fd;
      }
      .status-badge {
        display: inline-flex;
        align-items: center;
        gap: 0.25rem;
        border: 1px solid rgba(148, 163, 184, 0.35);
        border-radius: 999px;
        padding: 0.2rem 0.55rem;
        font-size: 0.72rem;
      }
      .tone-hot { color: #fecaca; border-color: rgba(251,113,133,.5); background: rgba(244,63,94,.16); }
      .tone-early { color: #bfdbfe; border-color: rgba(96,165,250,.5); background: rgba(59,130,246,.16); }
      .tone-up { color: #fde68a; border-color: rgba(250,204,21,.5); background: rgba(234,179,8,.16); }
      .tone-wait { color: #d8b4fe; border-color: rgba(192,132,252,.5); background: rgba(168,85,247,.16); }
      .sector-card {
        border: 1px solid rgba(148, 163, 184, 0.3);
        border-radius: 0.85rem;
        background: rgba(15, 23, 42, 0.7);
        padding: 0.85rem;
      }
    </style>
    <script>
      (function () {
        if (window.applySiteVersion) window.applySiteVersion(document);
      })();
    </script>
  </head>
  <body>
    <div class="bg-layer" aria-hidden="true"></div>
    <div class="bg-glow bg-glow--gold" aria-hidden="true"></div>
    <div class="bg-glow bg-glow--blue" aria-hidden="true"></div>

    <header class="site-header">
      <div class="container header-inner">
        <a class="logo" href="index.html">Y'ds</a>
        <nav class="nav" aria-label="주요 메뉴">
          <a href="index.html">홈</a>
          <a href="value-chain-map-fixed.html">KOREA VALUE CHAIN MAP</a>
        </nav>
      </div>
    </header>

    <main class="container py-10 md:py-14">
      <section class="mb-6">
        <h1 class="mt-3 text-3xl md:text-4xl font-semibold text-slate-100">Next Wave Sector Map</h1>
        <p class="mt-3 max-w-4xl text-sm md:text-base text-slate-300 leading-relaxed">
          종목이 아니라 병목과 자금 이동을 기준으로, 지금 시장의 위치와 다음 순환 구간을 읽는 지도입니다.
        </p>
      </section>

      <section class="nw-card mb-4">
        <p class="text-xs tracking-[0.18em] uppercase text-blue-200/80">AI 병목 지도</p>
        <div class="map-scroll mt-3" id="map-flow"></div>
      </section>

      <section class="nw-card mb-4">
        <div class="flex items-center justify-between gap-2">
          <p class="text-xs tracking-[0.18em] uppercase text-violet-200/80">TODAY STATUS</p>
          <a class="text-xs text-blue-200 hover:text-white" href="money-flow-tracker.html">Money Flow Tracker ↗</a>
        </div>
        <ul class="mt-3 text-sm text-slate-300 space-y-1" id="today-status-list">
          <li>데이터 계산 중...</li>
        </ul>
      </section>

      <section class="nw-card mb-6">
        <div class="flex items-center justify-between gap-2">
          <p class="text-xs tracking-[0.18em] uppercase text-rose-200/80">섹터 카드</p>
          <div class="flex items-center gap-2">
            <button class="status-badge tone-hot" id="mode-aggressive" type="button">공격형</button>
            <button class="status-badge tone-up" id="mode-stable" type="button">안정형</button>
          </div>
        </div>
        <div class="mt-3 grid grid-cols-1 gap-3 md:grid-cols-2" id="sector-card-list"></div>
      </section>

      <section class="mt-8 text-center">
        <p class="text-lg md:text-xl text-slate-100">시장은 종목으로 움직이지 않는다 → 병목과 돈의 흐름으로 움직인다.</p>
      </section>
    </main>

    <footer class="site-footer">
      <div class="container footer-inner">
        <p class="footer-brand"><a href="index.html" style="color: inherit; text-decoration: none">Y'ds의 투자 인사이트</a></p>
        <p class="footer-note">본 페이지는 투자 권유가 아니며, 학습·정리 목적입니다.</p>
      </div>
    </footer>

    <script>
      (function () {
        var sectorDefs = [
          {
            id: "gpu",
            label: "GPU/HBM",
            icon: "🧠",
            statusText: "완료",
            tone: "tone-up",
            sectorKey: "semiconductor",
            symbols: ["000660", "005930"],
            stocks: [{ name: "SK하이닉스", code: "000660" }, { name: "삼성전자", code: "005930" }],
            strategy: "주도 확인 후 일부 보유"
          },
          {
            id: "packaging",
            label: "패키징",
            icon: "🔥",
            statusText: "진행",
            tone: "tone-hot",
            sectorKey: "semiconductor",
            symbols: ["042700", "222800", "033640"],
            stocks: [{ name: "한미반도체", code: "042700" }, { name: "심텍", code: "222800" }, { name: "네패스", code: "033640" }],
            strategy: "눌림 매수"
          },
          {
            id: "power",
            label: "전력",
            icon: "📈",
            statusText: "상승",
            tone: "tone-up",
            sectorKey: "energy_power",
            symbols: ["298040", "010120", "267260"],
            stocks: [{ name: "효성중공업", code: "298040" }, { name: "LS ELECTRIC", code: "010120" }, { name: "HD현대일렉트릭", code: "267260" }],
            strategy: "조정 시 분할"
          },
          {
            id: "cooling",
            label: "냉각",
            icon: "🚀",
            statusText: "초기",
            tone: "tone-early",
            sectorKey: "electronics",
            symbols: ["083450", "036200", "343000"],
            stocks: [{ name: "GST", code: "083450" }, { name: "유니셈", code: "036200" }, { name: "케이엔솔", code: "343000" }],
            strategy: "초기 분할 진입"
          },
          {
            id: "material",
            label: "원자재",
            icon: "🧨",
            statusText: "대기",
            tone: "tone-wait",
            sectorKey: "energy_power",
            symbols: ["006260", "001440"],
            stocks: [{ name: "LS", code: "006260" }, { name: "대한전선", code: "001440" }],
            strategy: "조용히 축적"
          }
        ];

        function avg(values) {
          var nums = values.filter(function (v) { return Number.isFinite(v); });
          if (!nums.length) return Number.NaN;
          return nums.reduce(function (a, b) { return a + b; }, 0) / nums.length;
        }

        function classify(metrics) {
          var rsi = metrics.rsi;
          var spread = metrics.spread;
          var vol = metrics.vol;
          var macdGap = metrics.macdGap;
          if (Number.isFinite(rsi) && Number.isFinite(vol) && Number.isFinite(macdGap) && rsi >= 55 && rsi <= 73 && vol >= 1.2 && macdGap >= 0) {
            return { text: "🔥 진행 중", cls: "status-hot", strategy: "눌림 매수", score: 4, daily: "수급 유입 유지" };
          }
          if (Number.isFinite(rsi) && Number.isFinite(spread) && Number.isFinite(macdGap) && rsi >= 48 && rsi < 58 && spread >= -2 && macdGap >= 0) {
            return { text: "🚀 초기", cls: "status-early", strategy: "분할 진입", score: 3, daily: "초기 상승 진행" };
          }
          if (Number.isFinite(rsi) && Number.isFinite(spread) && rsi >= 60 && spread > 4) {
            return { text: "📈 상승 후 조정", cls: "status-up", strategy: "눌림만 매수", score: 2, daily: "숨고르기 구간" };
          }
          return { text: "🧨 대기", cls: "status-wait", strategy: "조용히 축적", score: 1, daily: "아직 조용" };
        }

        function renderMapFlow(activeId) {
          var wrap = document.getElementById("map-flow");
          if (!wrap) return;
          var html = "";
          sectorDefs.forEach(function (s, idx) {
            var cls = "map-node " + s.tone + (s.id === activeId ? " map-node--active" : "");
            html += '<a class="' + cls + '" href="#sector-' + s.id + '">' + s.icon + " " + s.label + "</a>";
            if (idx !== sectorDefs.length - 1) html += '<span class="map-arrow">→</span>';
          });
          wrap.innerHTML = html;
        }

        function renderSectorCards(states, mode) {
          var wrap = document.getElementById("sector-card-list");
          if (!wrap) return;
          var weights = mode === "stable"
            ? { packaging: 30, cooling: 20, power: 30, material: 15, gpu: 5 }
            : { packaging: 40, cooling: 25, power: 20, material: 10, gpu: 5 };
          wrap.innerHTML = sectorDefs.map(function (s) {
            var state = states[s.id] || { text: s.icon + " " + s.statusText, cls: s.tone, strategy: s.strategy };
            var stocks = s.stocks.map(function (st) {
              return '<a class="text-blue-200 hover:text-white" href="stock.html?name=' + encodeURIComponent(st.name) + "&code=" + encodeURIComponent(st.code) + "&theme=" + encodeURIComponent(s.label) + '">' + st.name + "</a>";
            }).join(", ");
            var weight = weights[s.id] || 0;
            return (
              '<article class="sector-card" id="sector-' + s.id + '">' +
              '<div class="flex items-center justify-between gap-2">' +
              '<h2 class="text-sm font-semibold text-slate-100"><a class="hover:text-white" href="sector-map.html?sector=' + encodeURIComponent(s.sectorKey || "semiconductor") + '">' + s.icon + " " + s.label + "</a></h2>" +
              '<span class="status-badge ' + state.cls + '">' + state.text + "</span></div>" +
              '<p class="mt-2 text-xs text-slate-300">대표: ' + stocks + "</p>" +
              '<p class="mt-1 text-xs text-slate-300">전략: ' + state.strategy + "</p>" +
              '<p class="mt-1 text-xs text-slate-400">추천 비중: ' + weight + "%</p>" +
              '</article>'
            );
          }).join("");
        }

        function renderFromTiming(timingBySymbol) {
          var states = {};
          sectorDefs.forEach(function (s) {
            var rows = s.symbols.map(function (code) { return timingBySymbol[code]; }).filter(Boolean);
            var metrics = {
              rsi: avg(rows.map(function (r) { return r.metrics && r.metrics.rsi14; })),
              spread: avg(rows.map(function (r) {
                var m = r.metrics || {};
                return Number.isFinite(m.close) && Number.isFinite(m.ma20) && m.ma20 !== 0 ? ((m.close - m.ma20) / m.ma20) * 100 : Number.NaN;
              })),
              vol: avg(rows.map(function (r) { return r.metrics && r.metrics.volumeRatio20; })),
              macdGap: avg(rows.map(function (r) {
                var m = r.metrics || {};
                return Number.isFinite(m.macdLine) && Number.isFinite(m.macdSignal) ? m.macdLine - m.macdSignal : Number.NaN;
              }))
            };
            states[s.id] = classify(metrics);
          });

          var scores = {
            gpu: 1,
            packaging: states.packaging.score,
            cooling: states.cooling.score,
            power: states.power.score,
            material: states.material.score
          };
          var status = document.getElementById("today-status-list");
          if (status) {
            status.innerHTML =
              "<li>패키징 " + states.packaging.text + " " + states.packaging.daily + "</li>" +
              "<li>냉각 " + states.cooling.text + " " + states.cooling.daily + "</li>" +
              "<li>전력 " + states.power.text + " " + states.power.daily + "</li>" +
              "<li>원자재 " + states.material.text + " " + states.material.daily + "</li>";
          }

          var top = Object.keys(scores).sort(function (a, b) { return scores[b] - scores[a]; })[0];
          renderMapFlow(top);
          var mode = document.body.getAttribute("data-portfolio-mode") || "aggressive";
          renderSectorCards(states, mode);
        }

        function refresh() {
          var all = [];
          sectorDefs.forEach(function (s) { all = all.concat(s.symbols); });
          fetch("/api/timing?symbols=" + encodeURIComponent(all.join(",")))
            .then(function (res) {
              if (!res.ok) throw new Error("timing fetch failed");
              return res.json();
            })
            .then(function (data) {
              renderFromTiming(data.timingBySymbol || {});
            })
            .catch(function () {
              renderMapFlow("packaging");
              renderSectorCards({}, document.body.getAttribute("data-portfolio-mode") || "aggressive");
            });
        }

        function setMode(mode) {
          document.body.setAttribute("data-portfolio-mode", mode);
          var a = document.getElementById("mode-aggressive");
          var s = document.getElementById("mode-stable");
          if (a && s) {
            if (mode === "stable") {
              s.classList.add("tone-hot");
              a.classList.remove("tone-hot");
            } else {
              a.classList.add("tone-hot");
              s.classList.remove("tone-hot");
            }
          }
          refresh();
        }

        var modeAgg = document.getElementById("mode-aggressive");
        var modeStable = document.getElementById("mode-stable");
        if (modeAgg) modeAgg.addEventListener("click", function () { setMode("aggressive"); });
        if (modeStable) modeStable.addEventListener("click", function () { setMode("stable"); });

        document.body.setAttribute("data-portfolio-mode", "aggressive");
        refresh();
        setInterval(refresh, 10 * 60 * 1000);

        var modeAgg = document.getElementById("mode-aggressive");
        var modeStable = document.getElementById("mode-stable");
        if (modeAgg) modeAgg.addEventListener("click", function () { applyPortfolioMode("aggressive"); });
        if (modeStable) modeStable.addEventListener("click", function () { applyPortfolioMode("stable"); });
      })();
    </script>
  </body>
</html>
