<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Money Flow Tracker · Y'ds의 투자 인사이트</title>
    <script src="site-version.js"></script>
    <link rel="stylesheet" href="styles.css" />
    <style>
      .mf-card {
        border: 1px solid rgba(146, 164, 201, 0.25);
        border-radius: 1rem;
        background: linear-gradient(180deg, rgba(18, 28, 52, 0.78), rgba(10, 16, 34, 0.9));
        padding: 1rem;
      }
      .mf-arrow {
        font-size: 1.1rem;
        color: #93c5fd;
        animation: pulse 1.8s infinite;
      }
      @keyframes pulse {
        0% { opacity: 0.35; transform: translateX(0); }
        50% { opacity: 1; transform: translateX(4px); }
        100% { opacity: 0.35; transform: translateX(0); }
      }
      .mf-sector {
        border: 1px solid rgba(148, 163, 184, 0.35);
        border-radius: 0.8rem;
        padding: 0.6rem 0.75rem;
        background: rgba(15, 23, 42, 0.75);
      }
      .mf-sector.is-active {
        border-color: rgba(96, 165, 250, 0.75);
        box-shadow: inset 0 0 0 1px rgba(96, 165, 250, 0.35), 0 0 20px rgba(59, 130, 246, 0.25);
      }
    </style>
    <script>
      (function () {
        if (window.applySiteVersion) window.applySiteVersion(document);
      })();
    </script>
  </head>
  <body>
    <div class="bg-layer" aria-hidden="true"></div>
    <div class="bg-glow bg-glow--gold" aria-hidden="true"></div>
    <div class="bg-glow bg-glow--blue" aria-hidden="true"></div>

    <header class="site-header">
      <div class="container header-inner">
        <a class="logo" href="index.html">Y'ds</a>
        <nav class="nav" aria-label="주요 메뉴">
          <a href="index.html">홈</a>
          <a href="next-wave-sector-map.html">NEXT WAVE SECTOR MAP</a>
        </nav>
      </div>
    </header>

    <main class="container py-10 md:py-14">
      <section class="mb-8">
        <h1 class="mt-3 text-3xl md:text-4xl font-semibold text-slate-100">Money Flow Tracker</h1>
        <p class="mt-3 text-sm text-slate-300">현재 돈 이동: 패키징 → 전력 → 냉각 (다음 예상: 원자재)</p>
      </section>

      <section class="mf-card">
        <div class="grid grid-cols-1 gap-3 md:grid-cols-7 items-center">
          <div class="mf-sector is-active" id="mf-packaging">패키징</div>
          <div class="text-center mf-arrow">→</div>
          <div class="mf-sector" id="mf-power">전력</div>
          <div class="text-center mf-arrow">→</div>
          <div class="mf-sector" id="mf-cooling">냉각</div>
          <div class="text-center mf-arrow">→</div>
          <div class="mf-sector" id="mf-material">원자재</div>
        </div>
        <p class="mt-4 text-sm text-slate-300" id="mf-comment">패키징이 선행 강세를 유지 중입니다.</p>
      </section>
    </main>

    <script>
      (function () {
        var order = ["mf-packaging", "mf-power", "mf-cooling", "mf-material"];
        var comments = [
          "패키징이 선행 강세를 유지 중입니다.",
          "전력으로 순환매가 확산되는 구간입니다.",
          "냉각이 초기 진입 신호를 보이는 구간입니다.",
          "원자재가 후행 수급을 받는 구간입니다."
        ];
        var idx = 0;
        function tick() {
          order.forEach(function (id) {
            var el = document.getElementById(id);
            if (el) el.classList.remove("is-active");
          });
          var active = document.getElementById(order[idx]);
          if (active) active.classList.add("is-active");
          var c = document.getElementById("mf-comment");
          if (c) c.textContent = comments[idx];
          idx = (idx + 1) % order.length;
        }
        setInterval(tick, 2200);
      })();
    </script>
  </body>
</html>
